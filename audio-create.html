<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHIPS Audio Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="submission.css?v=20260515-filter-audio" />
  </head>
  <body data-requires-auth="true">
    <main class="submission-shell">
      <div class="submission-topbar">
        <a class="brand-mark" href="index.html#top" aria-label="CHIPS home">
          <img src="assets/chips_logo_1.png" alt="CHIPS" />
        </a>
        <nav class="submission-nav" aria-label="운영 페이지" data-auth-nav hidden>
          <a href="profile-create.html">프로필 작성</a>
          <a class="is-active" href="audio-create.html">오디오 추가</a>
          <a href="audio-manage.html">오디오 관리</a>
          <a href="admin.html" data-admin-link>관리자</a>
          <a href="news-manage.html" data-admin-link>뉴스 작성</a>
          <a href="index.html#voice-sample">홈페이지</a>
        </nav>
        <div class="topbar-account" data-auth-greeting hidden></div>
      </div>

      <section class="submission-hero">
        <div>
          <p class="submission-kicker">VOICE SAMPLE UPLOAD</p>
          <h1>AUDIO CREATE</h1>
          <p>등록된 성우를 선택하고, 샘플 제목과 CHIPS 카테고리, 오디오 파일을 넣으면 R2에 성우별 폴더로 저장됩니다.</p>
        </div>
        <aside class="status-panel">
          <strong>저장 경로</strong>
          <p><code>audio/{actor_id}/{sample_id}.{ext}</code> 형식으로 저장됩니다. 카테고리는 여러 항목을 동시에 선택할 수 있습니다.</p>
        </aside>
      </section>

      <form class="submission-form" id="audio-form">
        <section class="form-section">
          <h2>기본 정보</h2>
          <div class="field-grid">
            <div class="field">
              <label for="actor-select">성우 선택</label>
              <select id="actor-select" name="actor_id" required>
                <option value="">성우 목록 불러오는 중</option>
              </select>
              <input id="actor-name" name="actor_name" type="hidden" />
            </div>
            <div class="field">
              <label for="sample-title">오디오 제목</label>
              <input id="sample-title" name="sample_title" required placeholder="예: 미소년 캐릭터 샘플" />
            </div>
            <div class="field is-wide">
              <span class="group-label">오디오 종류</span>
              <div class="audio-kind-options" id="audio-kind">
                <label class="audio-kind-card">
                  <input type="radio" name="audio_kind" value="sample" checked />
                  <span>
                    <strong>샘플 오디오</strong>
                    <small>검색과 프로필 샘플 목록에 표시됩니다.</small>
                  </span>
                </label>
                <label class="audio-kind-card">
                  <input type="radio" name="audio_kind" value="intro" />
                  <span>
                    <strong>자기소개</strong>
                    <small>성우당 1개만 유지되며, 새로 올리면 기존 자기소개를 교체합니다.</small>
                  </span>
                </label>
              </div>
            </div>
            <div class="field is-wide" id="representative-tags-field">
              <span class="group-label">대표 카테고리</span>
              <div class="representative-tag-grid" aria-label="대표 카테고리 최대 4개">
                <label><span>#</span><input name="representative_tag" placeholder="중국어" /></label>
                <label><span>#</span><input name="representative_tag" placeholder="10대" /></label>
                <label><span>#</span><input name="representative_tag" placeholder="츤데레" /></label>
                <label><span>#</span><input name="representative_tag" placeholder="소녀" /></label>
              </div>
              <small class="field-help">해당 오디오 샘플의 대표 카테고리를 입력해주세요. (최대 4개)</small>
            </div>
            <div class="field is-wide">
              <label for="language-note">언어/메모</label>
              <input id="language-note" name="notes" placeholder="예: 한국어, 10대/20대, 부끄러운 톤" />
            </div>
          </div>
        </section>

        <section class="form-section" id="audio-category-section">
          <h2>CHIPS 카테고리</h2>
          <div class="category-grid" id="audio-category-grid"></div>
        </section>

        <section class="form-section">
          <h2>오디오 파일</h2>
          <label class="file-drop" for="audio-file">
            <strong id="file-name">파일 선택</strong>
            <span>MP3, WAV, M4A, OGG, FLAC 파일을 업로드할 수 있습니다.</span>
          </label>
          <input id="audio-file" name="audio_file" type="file" accept="audio/*,.mp3,.wav,.m4a,.ogg,.flac" required hidden />
        </section>

        <div class="form-actions">
          <button class="secondary-button" type="reset">초기화</button>
          <button class="primary-button" type="submit">오디오 샘플 업로드</button>
        </div>
        <pre class="result-box" id="audio-result" hidden></pre>
      </form>
    </main>

    <script src="submission.js?v=20260520-representative-tags"></script>
  </body>
</html>
