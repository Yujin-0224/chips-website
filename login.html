<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHIPS Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="submission.css?v=20260515-auth" />
  </head>
  <body>
    <main class="submission-shell">
      <div class="submission-topbar">
        <a class="brand-mark" href="index.html#top" aria-label="CHIPS home">
          <img src="assets/chips_logo_1.png" alt="CHIPS" />
        </a>
        <nav class="submission-nav" aria-label="운영 페이지">
          <a class="is-active" href="login.html">로그인</a>
          <a href="signup-request.html">회원가입 요청</a>
          <a href="profile-edit.html">프로필 수정</a>
          <a href="audio-create.html">오디오 만들기</a>
        </nav>
      </div>

      <section class="submission-hero">
        <div>
          <p class="submission-kicker">CHIPS OPERATIONS</p>
          <h1>LOGIN</h1>
          <p>승인된 성우 계정으로 로그인하면 본인 프로필 수정과 오디오 업로드만 사용할 수 있습니다.</p>
        </div>
        <aside class="status-panel">
          <strong>계정 필요</strong>
          <p>아직 계정이 없다면 회원가입 요청을 먼저 보내주세요. 운영자가 승인하면 로그인이 가능해집니다.</p>
        </aside>
      </section>

      <form class="submission-form auth-form" id="login-form">
        <section class="form-section">
          <h2>로그인</h2>
          <div class="field-grid">
            <div class="field">
              <label for="login-username">아이디</label>
              <input id="login-username" name="username" autocomplete="username" required />
            </div>
            <div class="field">
              <label for="login-password">비밀번호</label>
              <input id="login-password" name="password" type="password" autocomplete="current-password" required />
            </div>
          </div>
        </section>

        <div class="form-actions">
          <a class="secondary-button button-link" href="signup-request.html">회원가입 요청</a>
          <button class="primary-button" type="submit">로그인</button>
        </div>
        <pre class="result-box" id="auth-result" hidden></pre>
      </form>
    </main>

    <script src="auth.js?v=20260515-auth"></script>
  </body>
</html>
