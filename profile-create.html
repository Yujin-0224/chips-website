<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHIPS Profile Create</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="submission.css?v=20260514-actor-select" />
  </head>
  <body>
    <main class="submission-shell">
      <div class="submission-topbar">
        <a class="brand-mark" href="index.html#top" aria-label="CHIPS home">
          <img src="assets/chips_logo_1.png" alt="CHIPS" />
        </a>
        <nav class="submission-nav" aria-label="작성 페이지">
          <a class="is-active" href="profile-create.html">프로필 만들기</a>
          <a href="audio-create.html">오디오 만들기</a>
          <a href="index.html#actors">성우 보기</a>
        </nav>
      </div>

      <section class="submission-hero">
        <div>
          <p class="submission-kicker">VOICE ACTOR PROFILE</p>
          <h1>PROFILE CREATE</h1>
          <p>프로필 기본 정보를 입력하면 운영자가 검토할 수 있도록 R2에 제출 데이터가 저장됩니다.</p>
        </div>
        <aside class="status-panel">
          <strong>운영자 검토</strong>
          <p>제출 데이터는 바로 공개되지 않고, 운영자가 승인한 뒤 웹사이트에 반영하는 흐름으로 사용할 수 있습니다.</p>
        </aside>
      </section>

      <form class="submission-form" id="profile-form">
        <section class="form-section">
          <h2>프로필 정보</h2>
          <div class="field-grid">
            <div class="field">
              <label for="profile-name">성우 이름</label>
              <input id="profile-name" name="name" required placeholder="예: 거누" />
            </div>
            <div class="field">
              <label for="profile-name-en">영문 표기</label>
              <input id="profile-name-en" name="name_en" placeholder="예: GEONU" />
            </div>
            <div class="field">
              <label for="profile-email">연락 이메일</label>
              <input id="profile-email" name="email" type="email" placeholder="review@example.com" />
            </div>
            <div class="field">
              <label for="profile-image">프로필 이미지</label>
              <input id="profile-image" name="profile_image" type="file" accept="image/*" />
            </div>
            <div class="field is-wide">
              <label for="profile-bio">소개글</label>
              <textarea id="profile-bio" name="bio" placeholder="목소리 특성, 가능한 장르, 간단한 소개를 적어주세요."></textarea>
            </div>
          </div>
        </section>

        <section class="form-section">
          <h2>대표 카테고리</h2>
          <div class="category-grid" id="profile-category-grid"></div>
        </section>

        <div class="form-actions">
          <button class="secondary-button" type="reset">초기화</button>
          <button class="primary-button" type="submit">프로필 제출</button>
        </div>
        <pre class="result-box" id="profile-result" hidden></pre>
      </form>
    </main>

    <script src="submission.js?v=20260514-actor-select"></script>
  </body>
</html>
