<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHIPS News Manage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="submission.css?v=20260521-news-manage" />
  </head>
  <body data-requires-auth="true" data-requires-admin="true">
    <main class="submission-shell">
      <div class="submission-topbar">
        <a class="brand-mark" href="index.html#top" aria-label="CHIPS home">
          <img src="assets/chips_logo_1.png" alt="CHIPS" />
        </a>
        <nav class="submission-nav" aria-label="운영 페이지" data-auth-nav hidden>
          <a href="profile-create.html">프로필 작성</a>
          <a href="audio-create.html">오디오 추가</a>
          <a href="audio-manage.html">오디오 관리</a>
          <a href="admin.html" data-admin-link>관리자</a>
          <a class="is-active" href="news-manage.html" data-admin-link>뉴스 작성</a>
          <a href="index.html#news">웹페이지</a>
        </nav>
        <div class="topbar-account" data-auth-greeting hidden></div>
      </div>

      <section class="submission-hero">
        <div>
          <p class="submission-kicker">STUDIO NEWS MANAGE</p>
          <h1>NEWS WRITE</h1>
          <p>Studio 메뉴에 공개되는 기사 이미지를 업로드하고, 제목과 카테고리, 본문을 작성합니다.</p>
        </div>
        <aside class="status-panel">
          <strong>운영자 전용</strong>
          <p>뉴스 작성, 수정, 삭제는 관리자 계정으로 로그인한 상태에서만 가능합니다.</p>
        </aside>
      </section>

      <section class="form-section news-editor-section">
        <div class="section-title-row">
          <div>
            <span class="submission-kicker">EDITOR</span>
            <h2 id="news-editor-title">새 뉴스 작성</h2>
          </div>
          <button class="secondary-button" type="button" id="news-reset">새 글 작성</button>
        </div>

        <form class="news-form" id="news-form">
          <input type="hidden" id="news-id" name="id" />
          <input type="hidden" name="action" value="save" />
          <div class="field-grid">
            <div class="field">
              <label for="news-title">제목</label>
              <input id="news-title" name="title" required />
            </div>
            <div class="field">
              <label for="news-date">날짜</label>
              <input id="news-date" name="datetime" type="date" required />
            </div>
            <div class="field">
              <label for="news-lead">부제목</label>
              <input id="news-lead" name="lead" required />
            </div>
            <div class="field">
              <label for="news-categories">뉴스 카테고리</label>
              <input id="news-categories" name="categories" required placeholder="Notice, Studio" />
              <small class="field-help">여러 개일 경우 쉼표로 구분해 주세요.</small>
            </div>
            <div class="field">
              <label for="news-image-file">이미지 업로드</label>
              <input id="news-image-file" name="image_file" type="file" accept="image/*" />
              <small class="field-help">새 이미지를 선택하면 기존 이미지보다 우선 적용됩니다.</small>
            </div>
            <div class="field">
              <label for="news-image">이미지 주소</label>
              <input id="news-image" name="image" placeholder="https://..." />
            </div>
            <div class="field is-wide">
              <label for="news-body">내용</label>
              <textarea id="news-body" name="body" rows="9" required></textarea>
              <small class="field-help">줄바꿈한 문장은 공개 화면에서 문단으로 표시됩니다.</small>
            </div>
          </div>

          <div class="form-actions compact-actions">
            <button class="secondary-button" type="reset">초기화</button>
            <button class="primary-button" type="submit">뉴스 저장</button>
          </div>
        </form>
      </section>

      <section class="form-section">
        <div class="section-title-row">
          <div>
            <span class="submission-kicker">ARCHIVE</span>
            <h2>등록된 뉴스</h2>
          </div>
          <button class="secondary-button" type="button" id="news-reload">다시 불러오기</button>
        </div>
        <div class="news-manage-list" id="news-manage-list"></div>
      </section>

      <pre class="result-box" id="news-result" hidden></pre>
    </main>

    <script src="news-manage.js?v=20260521-news-manage"></script>
  </body>
</html>
